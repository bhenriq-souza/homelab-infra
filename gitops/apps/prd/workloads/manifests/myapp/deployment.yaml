apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: prd-apps
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/part-of: workloads-prd
    homelab.io/environment: prd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: myapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: myapp
        homelab.io/environment: prd
    spec:
      containers:
        - name: myapp
          image: ghcr.io/bhenriq-souza/myapp:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: prd
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
