apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: prd-apps
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/part-of: workloads-prd
    homelab.io/environment: prd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: myapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: myapp
        homelab.io/environment: prd
    spec:
      containers:
        - name: myapp
          image: kennethreitz/httpbin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: APP_ENV
              value: prd
          livenessProbe:
            httpGet:
              path: /status/200
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status/200
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
