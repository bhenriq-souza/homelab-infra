apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-platform
  namespace: argocd
  labels:
    homelab.io/scope: cluster-shared
spec:
  project: default
  source:
    repoURL: https://github.com/bhenriq-souza/homelab-infra.git
    targetRevision: main
    path: gitops/apps/shared/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-shared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
