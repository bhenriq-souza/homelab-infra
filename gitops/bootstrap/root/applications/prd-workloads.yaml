apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prd-workloads
  namespace: argocd
  labels:
    homelab.io/environment: prd
    homelab.io/scope: environment
spec:
  project: default
  source:
    repoURL: https://github.com/bhenriq-souza/homelab-infra.git
    targetRevision: main
    path: gitops/apps/prd/workloads
  destination:
    server: https://kubernetes.default.svc
    namespace: prd-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
