apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-workloads
  namespace: argocd
  labels:
    homelab.io/environment: dev
    homelab.io/scope: environment
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/homelab-infra.git
    targetRevision: main
    path: gitops/apps/dev/workloads
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
